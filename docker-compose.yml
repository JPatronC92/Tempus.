
services:
  # ==========================================
  # SEMANTIC MOTOR SEEKER (Capa de Conocimiento)
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6340:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev_qdrant_key}
    volumes:
      - ./Semantic-motor-seeker/qdrant_data:/qdrant/storage

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_redis_pass} --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  semantic-api:
    build:
      context: ./Semantic-motor-seeker
      dockerfile: docker/Dockerfile
    container_name: semantic-api
    ports:
      - "8000:8000" # Accesible en http://localhost:8000
    environment:
      - MAX_WORKERS=1
      - LOG_LEVEL=info
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-dev_qdrant_key}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev_redis_pass}
      - 'VALID_API_KEYS={"sk_dev_12345": {"tier": "premium", "active": true}}'
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 10s
      retries: 3

  # ==========================================
  # TEMPUS ENGINE (Capa de Decisión Determinista)
  # ==========================================
  postgres:
    image: postgres:16
    container_name: tempus-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-tempus_db}
    ports:
      - "5432:5432"
    volumes:
      - tempus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  tempus-api:
    build:
      context: ./Tempus-Engine
      dockerfile: Dockerfile
    container_name: tempus-api
    ports:
      - "8001:8000" # Accesible en http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_SERVER=postgres
      - POSTGRES_DB=${POSTGRES_DB:-tempus_db}
      - SECRET_KEY=${TEMPUS_SECRET_KEY:-super_secret_jwt_key_for_production}
      - ENVIRONMENT=development
    command: >
      bash -c "alembic upgrade head && uvicorn src.interfaces.api.main:app --host 0.0.0.0 --port 8000"

  tempus-dashboard:
    build:
      context: ./Tempus-Engine/tempus-dashboard
      dockerfile: Dockerfile
    container_name: tempus-dashboard
    ports:
      - "3000:3000" # Accesible en http://localhost:3000
    depends_on:
      - tempus-api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_SEMANTIC_API_URL=http://localhost:8000

volumes:
  tempus_pgdata:
