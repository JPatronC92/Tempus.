name: 🛡️ Decision Database CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Frontend & Dashboard (Next.js)
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tempus-Engine/tempus-dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build Check (WASM experiments enabled)
        run: |
          # We use 'CI=false' to prevent Nexjs from treating warnings as errors
          export CI=false
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_SEMANTIC_API_URL: http://localhost:8000

  # 2. Governance Kernel (Python & Rust)
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: |
          cd Tempus-Engine
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint with Ruff (Non-blocking for now)
        run: |
          cd Tempus-Engine
          # Run check but don't fail the build if minor issues found
          ruff check . --exit-zero

  # 3. Docker Compose (Infrastructure Integrity)
  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Compose config
        run: docker compose config
